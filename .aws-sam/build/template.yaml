AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Riot Notifier - Check if a League of Legends player is in game and notify
  via webhooks
Parameters:
  RiotApiKey:
    Type: String
    Description: Riot Games API Key
    NoEcho: true
  SesSenderEmail:
    Type: String
    Description: Verified SES sender email address
  RiotRegion:
    Type: String
    Default: na1
    Description: Riot Games API region (e.g. na1, euw1, kr)
  PlayerName:
    Type: String
    Description: Riot Games player name to monitor
  TagLine:
    Type: String
    Description: Riot Games tag line to monitor (without the
  RecipientEmail:
    Type: String
    Description: Email address to notify when player is in game
  MatchRegion:
    Type: String
    Default: americas
    Description: Riot Games match region for Match-V5 API (americas, europe, asia)
  DiscordWebhookUrl:
    Type: String
    Default: ''
    Description: Discord webhook URL for game notifications (optional)
    NoEcho: true
Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: provided.al2023
    Architectures:
    - arm64
    Environment:
      Variables:
        RIOT_API_KEY:
          Ref: RiotApiKey
Resources:
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName:
        Fn::Sub: ${AWS::StackName}-notifications
  GameStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ${AWS::StackName}-game-stats
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: matchId
        AttributeType: S
      KeySchema:
      - AttributeName: matchId
        KeyType: HASH
  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: scheduler.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: InvokeGetGameStats
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: lambda:InvokeFunction
            Resource:
              Fn::GetAtt:
              - GetGameStatsFunction
              - Arn
  IsPlayerInGameFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: IsPlayerInGameFunction
      Handler: bootstrap
      Environment:
        Variables:
          RIOT_REGION:
            Ref: RiotRegion
          PLAYER_NAME:
            Ref: PlayerName
          TAG_LINE:
            Ref: TagLine
          DYNAMO_TABLE_NAME:
            Ref: GameStatsTable
          GET_GAME_STATS_FUNCTION_ARN:
            Fn::GetAtt:
            - GetGameStatsFunction
            - Arn
          SCHEDULER_ROLE_ARN:
            Fn::GetAtt:
            - SchedulerRole
            - Arn
          MATCH_REGION:
            Ref: MatchRegion
          SNS_TOPIC_ARN:
            Ref: NotificationTopic
      Events:
        PollSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Description: Check if player is in a League game every 5 minutes
            Enabled: true
      Policies:
      - Statement:
        - Effect: Allow
          Action: sns:Publish
          Resource:
            Ref: NotificationTopic
      - DynamoDBCrudPolicy:
          TableName:
            Ref: GameStatsTable
      - Statement:
        - Effect: Allow
          Action: scheduler:CreateSchedule
          Resource: '*'
        - Effect: Allow
          Action: iam:PassRole
          Resource:
            Fn::GetAtt:
            - SchedulerRole
            - Arn
    Metadata:
      BuildMethod: makefile
      SamResourceId: IsPlayerInGameFunction
  NotifyWebhooksFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: NotifyWebhooksFunction
      Handler: bootstrap
      Environment:
        Variables:
          DISCORD_WEBHOOK_URL:
            Ref: DiscordWebhookUrl
          SES_SENDER_EMAIL:
            Ref: SesSenderEmail
          RECIPIENT_EMAIL:
            Ref: RecipientEmail
      Events:
        SNSEvent:
          Type: SNS
          Properties:
            Topic:
              Ref: NotificationTopic
      Policies:
      - Statement:
        - Effect: Allow
          Action: ses:SendEmail
          Resource: '*'
    Metadata:
      BuildMethod: makefile
      SamResourceId: NotifyWebhooksFunction
  GetGameStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetGameStatsFunction
      Handler: bootstrap
      Environment:
        Variables:
          MATCH_REGION:
            Ref: MatchRegion
          DYNAMO_TABLE_NAME:
            Ref: GameStatsTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: GameStatsTable
    Metadata:
      BuildMethod: makefile
      SamResourceId: GetGameStatsFunction
