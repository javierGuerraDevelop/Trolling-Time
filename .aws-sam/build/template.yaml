AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Riot Notifier - Check if a League of Legends player is in game and notify
  via email
Parameters:
  RiotApiKey:
    Type: String
    Description: Riot Games API Key
    NoEcho: true
  SesSenderEmail:
    Type: String
    Description: Verified SES sender email address
  RiotRegion:
    Type: String
    Default: na1
    Description: Riot Games API region (e.g. na1, euw1, kr)
  PlayerName:
    Type: String
    Description: Riot Games player name to monitor
  TagLine:
    Type: String
    Description: Riot Games tag line to monitor (without the
  RecipientEmail:
    Type: String
    Description: Email address to notify when player is in game
Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: provided.al2023
    Architectures:
    - arm64
    Environment:
      Variables:
        RIOT_API_KEY:
          Ref: RiotApiKey
Resources:
  IsPlayerInGameFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: IsPlayerInGameFunction
      Handler: bootstrap
      Environment:
        Variables:
          RIOT_REGION:
            Ref: RiotRegion
          SES_SENDER_EMAIL:
            Ref: SesSenderEmail
          PLAYER_NAME:
            Ref: PlayerName
          TAG_LINE:
            Ref: TagLine
          RECIPIENT_EMAIL:
            Ref: RecipientEmail
      Events:
        PollSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Description: Check if player is in a League game every 5 minutes
            Enabled: true
      Policies:
      - Statement:
        - Effect: Allow
          Action: ses:SendEmail
          Resource: '*'
    Metadata:
      BuildMethod: makefile
      SamResourceId: IsPlayerInGameFunction
